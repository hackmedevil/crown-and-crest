name: Cleanup Expired Reservations

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup endpoint
        env:
          CLEANUP_URL: ${{ secrets.CLEANUP_RESERVATIONS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CLEANUP_URL" ]; then
            echo "CLEANUP_RESERVATIONS_URL secret is not set"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set"
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CLEANUP_URL"
